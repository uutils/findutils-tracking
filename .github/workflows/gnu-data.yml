name: CI

on:
  push:
    branches:
    - main
  schedule:
  - cron: "0 2 * * *"

# Allow the importer to push data/graph commits back to this repo.
permissions:
  contents: write

jobs:
  update:
    name: Import findutils test results and refresh graphs
    runs-on: ubuntu-latest
    env:
      # gh needs a token to list runs and download artifacts from
      # uutils/findutils. The default GITHUB_TOKEN can read another *public*
      # repo's artifacts; override with a PAT secret if that ever changes.
      GH_TOKEN: ${{ secrets.FINDUTILS_TOKEN || secrets.GITHUB_TOKEN }}
    steps:
    - name: Install deps
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pandas python3-matplotlib

    - name: Checkout repo
      uses: actions/checkout@v4

    # Since findutils commit bb6a5ba the compat.yml workflow publishes per-test
    # artifacts (gnu-full-result / bfs-full-result) instead of a date-keyed
    # summary. import_results.py fetches every successful run not yet recorded
    # (keyed by commit sha) and appends a summary entry, so it both backfills
    # missed days and performs the daily update.
    - name: Import GNU results
      shell: bash
      run: python3 import_results.py gnu

    - name: Import BFS results
      shell: bash
      run: python3 import_results.py bfs

    - name: Generate the graphs
      shell: bash
      run: |
        python3 graph.py gnu-result.json
        python3 graph.py bfs-result.json

    - name: Add & Commit
      uses: EndBug/add-and-commit@v9.1.4
      with:
        default_author: github_actions
        message: "Update of the findutils data and graphs"
        pull: '--autostash'
        add: |
          gnu-result.json
          bfs-result.json
          gnu-results.svg
          bfs-results.svg
